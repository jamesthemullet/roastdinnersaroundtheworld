name: Knip
on:
  pull_request:
    branches: [main]
jobs:
  knip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24.x
      - run: yarn install --frozen-lockfile --ignore-engines
      - run: yarn knip
